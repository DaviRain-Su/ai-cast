<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AI-CAST</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --base-color: #EAE6DF;
      --highlight: #FFFFFF;
      --shadow: #CFC9C0;
      --shadow-deep: #B5AEA3;
      --surface: #E2DDD6;
      --text-primary: #2C2A28;
      --text-muted: #8F8B84;
      --vinyl-base: #1C1B1A;
      --accent-red: #DE533E;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-mono: 'Space Mono', 'Courier New', monospace;
      --bezel-inset: inset 0 3px 6px rgba(0,0,0,0.06), inset 0 1px 2px rgba(0,0,0,0.1), 0 1px 0 rgba(255,255,255,0.7);
      --btn-outset: 0 4px 8px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.15), inset 0 2px 2px rgba(255,255,255,0.9);
      --btn-active: 0 1px 2px rgba(0,0,0,0.1), inset 0 2px 4px rgba(0,0,0,0.08), inset 0 1px 1px rgba(255,255,255,0.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--base-color);
      background-image: radial-gradient(circle at 50% 0%, #F5F3EF 0%, #E0DCD4 100%);
      color: var(--text-primary);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding-bottom: 40px;
    }

    .device {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 32px 16px;
      font-size: 0.7rem;
      letter-spacing: 2px;
      font-weight: 700;
      color: var(--text-muted);
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .power-light {
      width: 10px; height: 10px;
      background: var(--accent-red);
      border-radius: 50%;
      border: 1px solid #111;
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.4), 0 0 8px rgba(222,83,62,0.5);
    }
    #status-display { color: var(--text-muted); transition: color 0.3s; }

    /* ── Stage ── */
    .stage {
      padding: 16px 32px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }
    .stage-text { flex: 1; }
    .prompt {
      font-family: var(--font-serif);
      font-size: 2rem;
      font-style: italic;
      font-weight: 400;
      line-height: 1.2;
      color: #383532;
      text-shadow: 0 1px 1px rgba(255,255,255,0.8);
      margin-bottom: 8px;
    }
    .sub-prompt {
      font-size: 0.65rem;
      letter-spacing: 2px;
      color: var(--text-muted);
    }

    /* ── Vinyl ── */
    .vinyl-assembly {
      position: relative;
      flex-shrink: 0;
      width: 140px;
      height: 140px;
      margin-top: 8px;
    }
    .vinyl-bezel {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      background: var(--base-color);
      box-shadow: var(--bezel-inset);
    }
    .vinyl-disc {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--vinyl-base);
      box-shadow: 0 8px 16px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.15);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2;
      background-image:
        radial-gradient(circle, transparent 28%, rgba(255,255,255,0.03) 29%, transparent 30%),
        radial-gradient(circle, transparent 44%, rgba(255,255,255,0.05) 45%, transparent 46%),
        radial-gradient(circle, transparent 60%, rgba(255,255,255,0.04) 61%, transparent 62%),
        radial-gradient(circle, transparent 76%, rgba(255,255,255,0.06) 77%, transparent 78%);
    }
    .vinyl-reflection {
      position: absolute; inset: 0; border-radius: 50%;
      background: conic-gradient(from 0deg, transparent 0deg, rgba(255,255,255,0.07) 45deg, transparent 90deg, transparent 180deg, rgba(255,255,255,0.07) 225deg, transparent 270deg);
      pointer-events: none; z-index: 3;
    }
    .vinyl-label {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: #D9D3C8;
      border: 2px solid #111;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      position: relative; z-index: 4;
    }
    .label-text { font-size: 0.38rem; font-weight: 700; color: var(--text-primary); letter-spacing: 1px; }
    .vinyl-hole { width: 7px; height: 7px; border-radius: 50%; background: var(--base-color); box-shadow: inset 0 2px 4px rgba(0,0,0,0.6); margin: 5px 0; }
    .tonearm-base {
      position: absolute; top: -12px; right: -20px;
      width: 30px; height: 30px; border-radius: 50%;
      background: #D2CBC0;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2), inset 0 2px 2px rgba(255,255,255,0.8);
      z-index: 10;
    }
    .tonearm {
      position: absolute; top: 2px; right: -5px;
      width: 80px; height: 7px;
      background: linear-gradient(90deg, #A8A196 0%, #C4BDB1 100%);
      border-radius: 4px;
      transform-origin: right center;
      transform: rotate(-52deg);
      box-shadow: 0 4px 6px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.5);
      z-index: 9;
      transition: transform 0.6s cubic-bezier(0.5, 0, 0.2, 1);
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--shadow-deep);
      border-bottom: 1px solid var(--highlight);
      opacity: 0.6;
      margin: 24px 0 0;
    }

    /* ── Section label ── */
    .section-label {
      padding: 16px 32px 10px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--text-muted);
    }

    /* ── Input fields ── */
    .input-group { padding: 0 32px; margin-bottom: 12px; }
    .field-label {
      display: block;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    input[type="url"], select, textarea {
      width: 100%;
      background: var(--surface);
      border: none;
      border-radius: 8px;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      padding: 10px 14px;
      outline: none;
      box-shadow: var(--bezel-inset);
      transition: box-shadow 0.2s;
    }
    input[type="url"]:focus, select:focus, textarea:focus {
      box-shadow: var(--bezel-inset), 0 0 0 2px rgba(222,83,62,0.15);
    }
    select { appearance: none; cursor: pointer; }
    select option { background: #EAE6DF; }
    textarea { resize: vertical; min-height: 140px; line-height: 1.7; }

    .row { display: flex; gap: 12px; padding: 0 32px; margin-bottom: 12px; }
    .row .input-group { padding: 0; flex: 1; margin-bottom: 0; }

    /* ── Primary button ── */
    .transport { padding: 8px 32px 0; }
    .btn-housing {
      width: 100%;
      height: 68px;
      background: #DCD6CC;
      border-radius: 12px;
      box-shadow: var(--bezel-inset);
      padding: 7px;
      display: flex;
    }
    .main-btn {
      flex: 1;
      border: none;
      outline: none;
      border-radius: 8px;
      background: linear-gradient(180deg, #FAFAF8 0%, #E8E4DB 100%);
      box-shadow: var(--btn-outset);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: var(--font-mono);
    }
    .main-btn:active, .main-btn.active {
      transform: translateY(2px);
      box-shadow: var(--btn-active);
      background: linear-gradient(180deg, #EAE6DF 0%, #E0DBCF 100%);
    }
    .main-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .led {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #9A958E;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.5), 0 1px 1px rgba(255,255,255,0.6);
      transition: all 0.2s;
    }
    .led.on {
      background: var(--accent-red);
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.4), 0 0 10px rgba(222,83,62,0.6), 0 0 20px rgba(222,83,62,0.3);
    }
    .btn-label {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--text-primary);
      transition: color 0.2s;
    }
    .btn-label.active { color: var(--accent-red); }

    /* ── Status bar ── */
    .status-bar {
      margin: 10px 32px 0;
      padding: 8px 12px;
      border-radius: 6px;
      background: var(--surface);
      box-shadow: var(--bezel-inset);
      font-size: 0.65rem;
      letter-spacing: 1px;
      color: var(--text-muted);
      min-height: 34px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-bar.ok  { color: #5A8A5A; }
    .status-bar.err { color: var(--accent-red); }
    @keyframes blink { 50% { opacity: 0.3; } }
    .status-bar.loading .led-sm { animation: blink 0.8s infinite; }
    .led-sm {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    /* ── Voice shelf ── */
    .voice-shelf { padding: 0 32px; }
    .voice-track {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 4px;
    }
    .voice-track::-webkit-scrollbar { display: none; }
    .voice-chip {
      flex: 0 0 auto;
      padding: 7px 14px;
      border-radius: 20px;
      background: linear-gradient(180deg, #FAFAF8 0%, #E8E4DB 100%);
      box-shadow: var(--btn-outset);
      font-family: var(--font-mono);
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text-muted);
      cursor: pointer;
      border: none;
      outline: none;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .voice-chip:hover { color: var(--text-primary); }
    .voice-chip.selected {
      color: var(--accent-red);
      box-shadow: var(--btn-active);
      background: linear-gradient(180deg, #EAE6DF 0%, #E0DBCF 100%);
    }

    /* ── Audio player ── */
    .player-wrap {
      padding: 10px 32px 0;
      display: none;
    }
    .player-wrap.visible { display: block; }
    audio {
      width: 100%;
      border-radius: 8px;
      box-shadow: var(--bezel-inset);
      filter: invert(0.08) sepia(0.1);
    }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 10px; height: 10px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
  </style>
</head>
<body>
<div class="device">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="power-light"></div>
      <span>AI-CAST</span>
    </div>
    <div id="status-display">SYS.RDY</div>
  </div>

  <!-- Stage -->
  <div class="stage">
    <div class="stage-text">
      <h1 class="prompt">Paste an article,<br>hear it come alive.</h1>
      <p class="sub-prompt">AI PODCAST GENERATOR</p>
    </div>
    <div class="vinyl-assembly">
      <div class="vinyl-bezel"></div>
      <div class="vinyl-disc" id="vinyl-disc">
        <div class="vinyl-reflection"></div>
        <div class="vinyl-label">
          <span class="label-text">AI</span>
          <div class="vinyl-hole"></div>
          <span class="label-text">CAST</span>
        </div>
      </div>
      <div class="tonearm-base"></div>
      <div class="tonearm" id="tonearm"></div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Article input -->
  <div class="section-label">INPUT // ARTICLE</div>
  <div class="input-group">
    <label class="field-label">URL</label>
    <input id="url" type="url" placeholder="https://example.com/article" />
  </div>

  <div class="row">
    <div class="input-group">
      <label class="field-label">STYLE</label>
      <select id="style">
        <option value="deep_dive">深度解读</option>
        <option value="news">新闻资讯</option>
        <option value="story">故事叙事</option>
        <option value="interview">对话访谈</option>
      </select>
    </div>
  </div>

  <!-- Generate script button -->
  <div class="transport">
    <div class="btn-housing">
      <button class="main-btn" id="btn-script">
        <div class="led" id="led-script"></div>
        <span class="btn-label" id="lbl-script">GENERATE SCRIPT</span>
      </button>
    </div>
  </div>
  <div class="status-bar" id="status-script">SYS.RDY // 等待输入</div>

  <div class="divider" style="margin-top:16px;"></div>

  <!-- Script output -->
  <div class="section-label">OUTPUT // SCRIPT</div>
  <div class="input-group">
    <textarea id="script" placeholder="播客脚本将显示在这里，可直接编辑…"></textarea>
  </div>

  <div class="divider"></div>

  <!-- Voice shelf -->
  <div class="section-label">VOICE // SELECT</div>
  <div class="voice-shelf">
    <div class="voice-track" id="voice-track"></div>
  </div>

  <!-- Generate audio button -->
  <div class="transport" style="margin-top:16px;">
    <div class="btn-housing">
      <button class="main-btn" id="btn-audio">
        <div class="led" id="led-audio"></div>
        <span class="btn-label" id="lbl-audio">BROADCAST</span>
      </button>
    </div>
  </div>
  <div class="status-bar" id="status-audio">SYS.RDY // 等待脚本</div>

  <!-- Audio player -->
  <div class="player-wrap" id="player-wrap">
    <audio id="player" controls></audio>
  </div>

</div>

<script>
  const $ = id => document.getElementById(id);
  let selectedVoice = '';

  // Load voices
  fetch('/api/voices')
    .then(r => r.json())
    .then(voices => {
      const track = $('voice-track');
      voices.forEach((v, i) => {
        const btn = document.createElement('button');
        btn.className = 'voice-chip' + (i === 0 ? ' selected' : '');
        btn.textContent = v.label;
        btn.dataset.value = v.value;
        if (i === 0) selectedVoice = v.value;
        btn.addEventListener('click', () => {
          track.querySelectorAll('.voice-chip').forEach(c => c.classList.remove('selected'));
          btn.classList.add('selected');
          selectedVoice = v.value;
        });
        track.appendChild(btn);
      });
    });

  function setStatus(el, msg, type = '') {
    el.className = 'status-bar' + (type ? ' ' + type : '');
    if (type === 'loading') {
      el.innerHTML = `<span class="led-sm"></span><span class="spinner"></span> ${msg}`;
    } else {
      el.innerHTML = `<span class="led-sm"></span>${msg}`;
    }
  }

  function setVinylSpinning(on) {
    const disc = $('vinyl-disc');
    const arm  = $('tonearm');
    const disp = $('status-display');
    if (on) {
      disc.style.animation = 'spin 2s linear infinite';
      arm.style.transform = 'rotate(-15deg)';
      disp.style.color = 'var(--accent-red)';
    } else {
      disc.style.animation = 'none';
      arm.style.transform = '';
      disp.style.color = '';
    }
  }

  // Generate script
  $('btn-script').addEventListener('click', async () => {
    const url = $('url').value.trim();
    if (!url) { setStatus($('status-script'), '请输入文章链接', 'err'); return; }

    $('btn-script').disabled = true;
    $('led-script').classList.add('on');
    $('lbl-script').classList.add('active');
    $('status-display').textContent = 'PROC...';
    setVinylSpinning(true);
    setStatus($('status-script'), '正在抓取文章并生成脚本…', 'loading');

    try {
      const res = await fetch('/api/generate-script', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, style: $('style').value }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      $('script').value = data.script;
      $('status-display').textContent = 'RDY';
      setStatus($('status-script'), `✓ ${data.title.slice(0, 48)}`, 'ok');
    } catch (e) {
      $('status-display').textContent = 'ERR';
      setStatus($('status-script'), e.message, 'err');
    } finally {
      $('btn-script').disabled = false;
      $('led-script').classList.remove('on');
      $('lbl-script').classList.remove('active');
      setVinylSpinning(false);
    }
  });

  // Generate audio
  $('btn-audio').addEventListener('click', async () => {
    const script = $('script').value.trim();
    if (!script) { setStatus($('status-audio'), '请先生成脚本', 'err'); return; }

    $('btn-audio').disabled = true;
    $('led-audio').classList.add('on');
    $('lbl-audio').classList.add('active');
    $('status-display').textContent = 'CAST...';
    setVinylSpinning(true);
    setStatus($('status-audio'), '正在合成语音，请稍候…', 'loading');

    try {
      const res = await fetch('/api/generate-audio', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ script, voice: selectedVoice }),
      });
      if (!res.ok) { const d = await res.json(); throw new Error(d.error); }
      const blob = await res.blob();
      const player = $('player');
      player.src = URL.createObjectURL(blob);
      $('player-wrap').classList.add('visible');
      player.play();
      $('status-display').textContent = 'ON AIR';
      setStatus($('status-audio'), '✓ 语音合成完成，正在播放', 'ok');
    } catch (e) {
      $('status-display').textContent = 'ERR';
      setStatus($('status-audio'), e.message, 'err');
    } finally {
      $('btn-audio').disabled = false;
      $('led-audio').classList.remove('on');
      $('lbl-audio').classList.remove('active');
      setVinylSpinning(false);
    }
  });
</script>
</body>
</html>
